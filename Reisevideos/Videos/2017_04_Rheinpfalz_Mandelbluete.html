<video id="videoPlayer" controls autoplay playsinline >
  <source src="2017_04_Rheinpfalz_Mandelbluete.mp4" type="video/mp4">
  Video "2017_04_Rheinpfalz_Mandelbluete.mp4" nicht verfügbar.
</video>

<script>
  const video = document.getElementById('videoPlayer');
  const hint  = document.getElementById('muteHint');
  if (video && hint) {
      if (!video.muted) {
          hint.style.display = 'none';
      }
      hint.onclick = function() {
          video.muted = false;
          video.play();
          hint.style.display = 'none';
      }
  }
</script>
