<!DOCTYPE html>

<title>Reisevideos</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; margin:0; padding:0; }
  h2 { text-align: center; margin: 20px 0; }

.responsive { padding: 0 6px; float: left; width: 8.33333%; }
@media only screen and (max-width: 2400px) { .responsive { width: 9.09%; margin: 6px 0; } }
@media only screen and (max-width: 2250px) { .responsive { width: 9.99999%; margin: 6px 0; } }
@media only screen and (max-width: 2080px) { .responsive { width: 11.11%; margin: 6px 0; } }
@media only screen and (max-width: 1920px) { .responsive { width: 12.49999%; margin: 6px 0; } }
@media only screen and (max-width: 1770px) { .responsive { width: 14.28%; margin: 6px 0; } }
@media only screen and (max-width: 1600px) { .responsive { width: 16.66666%; margin: 6px 0; } }
@media only screen and (max-width: 1400px) { .responsive { width: 19.99999%; margin: 6px 0; } }
@media only screen and (max-width: 1200px) { .responsive { width: 24.99999%; margin: 6px 0; } }
@media only screen and (max-width: 950px) { .responsive { width: 33.33333%; margin: 6px 0; } }
@media only screen and (max-width: 700px) { .responsive { width: 49.99999%; margin: 6px 0; } }
@media only screen and (max-width: 500px) { .responsive { width: 100%; } } 

  .gallery {
    border: 1px solid #ccc;
    padding: 5px;
    text-align: center;
  }

  .gallery:hover { border: 1px solid #777; }

  .gallery img {
    width: 100%;
    height: auto;
    display: block;
  }

  .clearfix::after {
    content: "";
    display: table;
    clear: both;
  }
</style>
</head>
